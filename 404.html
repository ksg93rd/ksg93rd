<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>404 — Page Not Found | Kismoe Business Services</title>
    <meta name="robots" content="noindex" />
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      html { scroll-behavior: smooth; }
      body {
        font-family: 'Inter', system-ui, sans-serif;
        background: #0a0f1e;
        color: #f0f6ff;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }
      a { color: inherit; text-decoration: none; }
      button { cursor: pointer; border: none; background: none; font: inherit; }

      /* Nav */
      nav {
        padding: 1.25rem 2rem;
        border-bottom: 1px solid rgba(255,255,255,0.08);
        display: flex;
        align-items: center;
      }
      .nav-logo {
        font-size: 1.4rem;
        font-weight: 800;
        background: linear-gradient(135deg, #3b82f6, #14b8a6);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }
      .nav-logo span { font-weight: 400; opacity: 0.7; }

      /* Main */
      main {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 4rem 2rem;
        text-align: center;
      }
      .content { max-width: 520px; }

      .error-code {
        font-size: clamp(5rem, 18vw, 9rem);
        font-weight: 800;
        line-height: 1;
        background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        margin-bottom: 1rem;
      }
      h1 {
        font-size: clamp(1.5rem, 4vw, 2rem);
        font-weight: 700;
        margin-bottom: 1rem;
      }
      .message {
        color: #94a3b8;
        font-size: 1rem;
        line-height: 1.6;
        margin-bottom: 2.5rem;
      }
      .actions {
        display: flex;
        gap: 1rem;
        justify-content: center;
        flex-wrap: wrap;
      }
      .btn {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        padding: 0.75rem 1.75rem;
        border-radius: 12px;
        font-weight: 600;
        font-size: 0.95rem;
        transition: all 0.2s ease;
        white-space: nowrap;
      }
      .btn-primary {
        background: linear-gradient(135deg, #3b82f6, #8b5cf6);
        color: #fff;
        box-shadow: 0 4px 16px rgba(59,130,246,0.3);
      }
      .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(59,130,246,0.4); }
      .btn-ghost {
        background: transparent;
        border: 1px solid rgba(255,255,255,0.12);
        color: #94a3b8;
      }
      .btn-ghost:hover { border-color: rgba(255,255,255,0.25); color: #f0f6ff; }

      /* Footer */
      footer {
        padding: 1.5rem 2rem;
        text-align: center;
        font-size: 0.8rem;
        color: #64748b;
        border-top: 1px solid rgba(255,255,255,0.06);
      }
    </style>
  </head>
  <body>
    <nav>
      <a href="/ksg93rd/" class="nav-logo">Kismoe <span>Business AI</span></a>
    </nav>

    <main>
      <div class="content">
        <div class="error-code">404</div>
        <h1>Page not found</h1>
        <p class="message">Looks like this page took an unplanned exit. Let's get your business back on track.</p>
        <div class="actions">
          <a href="/ksg93rd/" class="btn btn-primary">Go Home</a>
          <a href="/ksg93rd/#chat" class="btn btn-ghost">Talk to AI</a>
        </div>
      </div>
    </main>

    <footer>
      &copy; 2026 Kismoe Business Services. All rights reserved.
    </footer>
  </body>
</html>
